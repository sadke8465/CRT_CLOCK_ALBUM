<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Remote</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f2f1ec;
    color: #1d1d1f;
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 24px 64px;
    gap: 24px;
  }

  /* ── Header ── */
  .eyebrow {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #8e8e93;
    animation: fadeUp 0.4s ease both;
  }

  /* ── Segmented control ── */
  .segment {
    width: 100%;
    max-width: 340px;
    background: rgba(0,0,0,0.07);
    border-radius: 11px;
    padding: 3px;
    display: flex;
    position: relative;
    animation: fadeUp 0.4s ease both 0.04s;
  }

  .seg-pill {
    position: absolute;
    inset: 3px auto 3px 3px;
    width: calc(50% - 3px);
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.13), 0 0 0 0.5px rgba(0,0,0,0.05);
    transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    pointer-events: none;
  }

  .seg-pill.right { transform: translateX(calc(100% + 6px)); }

  .seg-btn {
    flex: 1;
    padding: 9px 0;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    color: #8e8e93;
    cursor: pointer;
    border-radius: 8px;
    position: relative;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .seg-btn.active { color: #1d1d1f; }
  .seg-btn:active  { opacity: 0.6; }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 340px;
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 3px 14px rgba(0,0,0,0.07);
    animation: fadeUp 0.4s ease both 0.08s;
    transition: opacity 0.28s ease, transform 0.28s ease;
  }

  .card.dimmed {
    opacity: 0.28;
    transform: scale(0.975);
    pointer-events: none;
  }

  .row {
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .row + .row {
    border-top: 0.5px solid rgba(0,0,0,0.07);
  }

  .row-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aeaeb2;
  }

  /* ── Input row ── */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .text-input {
    flex: 1;
    background: #f2f1ec;
    border: none;
    border-radius: 9px;
    color: #1d1d1f;
    font-family: inherit;
    font-size: 0.88rem;
    padding: 10px 12px;
    outline: none;
    transition: background 0.18s;
    min-width: 0;
  }

  .text-input:focus       { background: #e8e7e1; }
  .text-input::placeholder { color: #c7c7cc; }

  .apply-btn {
    padding: 10px 15px;
    background: #1d1d1f;
    border: none;
    border-radius: 9px;
    color: #fff;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .apply-btn:active { opacity: 0.7; transform: scale(0.95); }

  /* ── Slider ── */
  .slider-group { display: flex; flex-direction: column; gap: 10px; }

  .slider-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .slider-meta .lbl { font-size: 0.88rem; color: #3a3a3c; }
  .slider-meta .val {
    font-size: 0.88rem;
    font-weight: 600;
    color: #1d1d1f;
    font-variant-numeric: tabular-nums;
  }

  .slider-track {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .track-cap { font-size: 0.7rem; color: #c7c7cc; flex-shrink: 0; }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: #e5e5ea;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #1d1d1f;
    box-shadow: 0 1px 5px rgba(0,0,0,0.22);
    transition: transform 0.12s;
    cursor: pointer;
  }

  input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.18); }

  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #1d1d1f;
    box-shadow: 0 1px 5px rgba(0,0,0,0.22);
    border: none;
    cursor: pointer;
  }

  /* ── Status ── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    animation: fadeUp 0.4s ease both 0.12s;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c7c7cc;
    flex-shrink: 0;
    transition: background 0.4s;
  }

  .dot.ok  { background: #34c759; }
  .dot.err { background: #ff3b30; }

  .status-text {
    font-size: 0.73rem;
    color: #aeaeb2;
    transition: color 0.3s;
  }

  .status-text.err { color: #ff3b30; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<p class="eyebrow">Remote</p>

<div class="segment">
  <div class="seg-pill" id="seg-pill"></div>
  <button class="seg-btn active" id="btn-albums" onclick="setMode('albums')">Albums</button>
  <button class="seg-btn"        id="btn-demo"   onclick="setMode('demo')">Demo</button>
</div>

<div class="card" id="demo-card">
  <div class="row">
    <div class="row-label">Collection</div>
    <div class="input-row">
      <input class="text-input" type="text" id="collection-input" placeholder="archive.org identifier" />
      <button class="apply-btn" onclick="applyCollection()">Apply</button>
    </div>
  </div>

  <div class="row">
    <div class="row-label">Stretch</div>
    <div class="slider-group">
      <div class="slider-meta">
        <span class="lbl">Horizontal</span>
        <span class="val" id="stretch-label">1.00×</span>
      </div>
      <div class="slider-track">
        <span class="track-cap">0.5×</span>
        <input type="range" id="stretch-slider" min="0.5" max="2.0" step="0.05" value="1.0"
               oninput="onStretchInput(this.value)" onchange="commitStretch(this.value)" />
        <span class="track-cap">2×</span>
      </div>
    </div>
  </div>
</div>

<div class="status-row">
  <div class="dot" id="dot"></div>
  <span class="status-text" id="status">Connecting…</span>
</div>

<script type="module">
  import { initializeApp }                      from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js';
  import { getDatabase, ref, onValue, update }  from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-database.js';
  import { firebaseConfig }                     from './firebase-config.js';

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const settingsRef = ref(db, 'settings');

  const dot        = document.getElementById('dot');
  const statusEl   = document.getElementById('status');
  const btnAlbums  = document.getElementById('btn-albums');
  const btnDemo    = document.getElementById('btn-demo');
  const segPill    = document.getElementById('seg-pill');
  const demoCard   = document.getElementById('demo-card');
  const colInput   = document.getElementById('collection-input');
  const slider     = document.getElementById('stretch-slider');
  const stretchLbl = document.getElementById('stretch-label');

  const connectTimeout = setTimeout(() => {
    if (!dot.classList.contains('ok')) {
      statusEl.textContent = 'Cannot reach Firebase';
      statusEl.className   = 'status-text err';
      dot.className        = 'dot err';
    }
  }, 10000);

  onValue(settingsRef, snap => {
    clearTimeout(connectTimeout);
    const s    = snap.val() || {};
    const mode = s.mode || 'albums';

    btnAlbums.classList.toggle('active', mode === 'albums');
    btnDemo.classList.toggle('active',   mode === 'demo');
    segPill.className = 'seg-pill' + (mode === 'demo' ? ' right' : '');
    demoCard.classList.toggle('dimmed', mode !== 'demo');

    const demo = s.demo || {};
    if (document.activeElement !== colInput)
      colInput.value = demo.collection || 'demolitionkitchenvideo';
    if (document.activeElement !== slider) {
      const v = demo.horizontalStretch ?? 1.0;
      slider.value           = v;
      stretchLbl.textContent = Number(v).toFixed(2) + '×';
    }

    dot.className        = 'dot ok';
    statusEl.textContent = 'Connected';
    statusEl.className   = 'status-text';
  }, err => {
    clearTimeout(connectTimeout);
    statusEl.textContent = err.message;
    statusEl.className   = 'status-text err';
    dot.className        = 'dot err';
  });

  window.setMode = mode => update(settingsRef, { mode });

  window.applyCollection = () => {
    const val = colInput.value.trim();
    if (!val) return;
    update(ref(db, 'settings/demo'), { collection: val });
  };

  window.onStretchInput = val => {
    stretchLbl.textContent = Number(val).toFixed(2) + '×';
  };

  window.commitStretch = val => {
    update(ref(db, 'settings/demo'), { horizontalStretch: parseFloat(val) });
  };
</script>

</body>
</html>
