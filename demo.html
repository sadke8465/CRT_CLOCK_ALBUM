<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%; height: 100%;
background: #000;
overflow: hidden;
cursor: none;
}

.vid {
position: fixed;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
display: block;
opacity: 0;
transition: opacity 0.35s ease;
z-index: 1;
}

.vid.active {
opacity: 1;
z-index: 2;
}

#flash {
position: fixed;
inset: 0;
background: #000;
z-index: 10;
opacity: 0;
pointer-events: none;
transition: opacity 0.25s ease;
}

#flash.on { opacity: 1; }
</style>

</head>
<body>

<video id="v0" class="vid active" autoplay muted playsinline></video>
<video id="v1" class="vid"        autoplay muted playsinline></video>

<div id="flash"></div>

<script type="module">
  import { initializeApp }                    from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js';
  import { getDatabase, ref, onValue }        from 'https://www.gstatic.com/firebasejs/11.3.1/firebase-database.js';
  import { firebaseConfig }                   from './firebase-config.js';

  const SEARCH_URL =
    'https://archive.org/advancedsearch.php' +
    '?q=collection%3Ademolitionkitchenvideo+AND+mediatype%3Amovies' +
    '&fl[]=identifier,title&rows=500&page=1&output=json';
  const META_BASE     = 'https://archive.org/metadata/';
  const DOWNLOAD_BASE = 'https://archive.org/download/';
  const VIDEO_FMTS    = ['h.264','mpeg4','mp4','ogg video','webm'];
  const VIDEO_EXTS    = ['.mp4','.webm','.ogv'];
  const READY_THRESH  = 3; // seconds buffered before allowing switch

  let items         = [];
  let used          = new Set();
  let activeIdx     = 0;
  let switchPending = false;
  let preloading    = false;
  let preloadDone   = false;
  let booting       = true;

  const vids  = [document.getElementById('v0'), document.getElementById('v1')];
  const flash = document.getElementById('flash');

  async function fetchItems() {
    const res  = await fetch(SEARCH_URL);
    const json = await res.json();
    items = (json.response?.docs || []).filter(d => d.mediatype !== 'audio');
    if (!items.length) throw new Error('No items');
  }

  function pickItem() {
    if (used.size >= items.length) used.clear();
    let idx;
    do { idx = Math.floor(Math.random() * items.length); } while (used.has(idx));
    used.add(idx);
    return items[idx];
  }

  async function getVideoUrl(identifier) {
    const res   = await fetch(META_BASE + identifier);
    const json  = await res.json();
    const files = json.files || [];
    const ranked = files
      .filter(f => {
        const fmt  = (f.format || '').toLowerCase();
        const name = (f.name   || '').toLowerCase();
        return VIDEO_FMTS.some(v => fmt.includes(v)) || VIDEO_EXTS.some(e => name.endsWith(e));
      })
      .sort((a, b) => {
        const score = f => {
          const fmt = (f.format || '').toLowerCase();
          if (fmt.includes('h.264')) return 0;
          if (fmt.includes('mp4') || fmt.includes('mpeg4')) return 1;
          if (fmt.includes('webm')) return 2;
          return 3;
        };
        return score(a) - score(b);
      });
    if (!ranked.length) return null;
    return DOWNLOAD_BASE + identifier + '/' + encodeURIComponent(ranked[0].name);
  }

  async function preloadNext() {
    if (preloading || preloadDone) return;
    preloading = true;

    const next = vids[1 - activeIdx];
    next.src = '';
    next.removeAttribute('src');

    let attempts = 0;
    while (attempts < 8) {
      const item = pickItem();
      attempts++;
      try {
        const url = await getVideoUrl(item.identifier);
        if (!url) continue;

        await new Promise((resolve, reject) => {
          next.src = url;
          next.load();

          function cleanup() {
            next.removeEventListener('progress',  onProgress);
            next.removeEventListener('canplay',   onCanPlay);
            next.removeEventListener('error',     onError);
          }
          const onProgress = () => {
            if (next.buffered.length && next.buffered.end(0) >= READY_THRESH) {
              cleanup(); resolve();
            }
          };
          const onCanPlay = () => { cleanup(); resolve(); };
          const onError   = () => { cleanup(); reject(new Error('video error')); };

          next.addEventListener('progress', onProgress);
          next.addEventListener('canplay',  onCanPlay);
          next.addEventListener('error',    onError);
        });

        preloading  = false;
        preloadDone = true;

        if (switchPending) {
          switchPending = false;
          doSwitch();
        }
        return;

      } catch(e) {
        // try next item
      }
    }

    preloading = false;
  }

  function doSwitch() {
    const current = vids[activeIdx];
    const next    = vids[1 - activeIdx];

    flash.classList.add('on');

    setTimeout(() => {
      current.classList.remove('active');
      next.classList.add('active');
      next.play().catch(() => {});
      activeIdx = 1 - activeIdx;

      // Let flash linger one frame then fade
      requestAnimationFrame(() => {
        flash.classList.remove('on');
      });

      preloadDone = false;
      preloading  = false;
      preloadNext();
    }, 260);
  }

  function onTap() {
    if (booting) return;
    if (switchPending) return; // one queued tap is enough

    if (preloadDone) {
      doSwitch();
    } else {
      switchPending = true;
    }
  }

  document.addEventListener('click', onTap);
  document.addEventListener('touchstart', e => { e.preventDefault(); onTap(); }, { passive: false });
  document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); onTap(); } });

  vids.forEach(v => v.addEventListener('ended', () => {
    if (switchPending) return;
    if (preloadDone) { doSwitch(); } else { switchPending = true; }
  }));

  async function boot() {
    await fetchItems();

    let loaded = false;
    while (!loaded) {
      const item = pickItem();
      try {
        const url = await getVideoUrl(item.identifier);
        if (!url) continue;
        vids[0].src = url;
        vids[0].load();
        await new Promise((resolve, reject) => {
          vids[0].addEventListener('canplay', resolve, { once: true });
          vids[0].addEventListener('error',   reject,  { once: true });
        });
        vids[0].play().catch(() => {});
        loaded = true;
      } catch(e) { /* retry */ }
    }

    booting = false;
    preloadNext();
  }

  boot();

  // Firebase remote "Next Video" listener
  const fbApp = initializeApp(firebaseConfig);
  const fbDb  = getDatabase(fbApp);
  let lastSwitchVideo = undefined;
  onValue(ref(fbDb, 'settings/demo/switchVideo'), snap => {
    const val = snap.val();
    if (lastSwitchVideo === undefined) { lastSwitchVideo = val; return; }
    if (val !== lastSwitchVideo) { lastSwitchVideo = val; onTap(); }
  });
</script>

</body>
</html>
